openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: evolving-mind-ai
  version: 1.0.0
  description: API for Slackbot Lambda testing
servers:
  - url: https://evolving-mind-api.amazon.com/
    description: Development server
components:
  headers:
    x-correlation-id:
      schema:
        type: string
      description: Unique request identifier for tracing (REQUIRED - caller must provide)
      required: true
paths:
  /ui/slackbot/ping:
    post:
      summary: Slackbot Lambda test
      operationId: pingSlackbot
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
            example:
              text: "Hello World from Postman"
      responses:
        '200':
          description: Pong response
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
              example:
                text: "pong"

  /proc/workflow:
    post:
      summary: Start new workflow (user schema/workflow creation)
      operationId: startWorkflow
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workflowId, steps, userId]
              properties:
                workflowId:
                  type: string
                  description: Unique identifier for the workflow
                steps:
                  type: array
                  items:
                    type: object
                    required: [stepType, pgdFunction]
                    properties:
                      stepType:
                        type: string
                        enum: ["inventory-adjust", "recipe-process"]
                        description: Type of workflow step
                      pgdFunction:
                        type: string
                        description: Stored new Function() code for PGD execution
                      serviceCall:
                        type: object
                        properties:
                          url:
                            type: string
                          method:
                            type: string
                            enum: [GET, POST, PUT, DELETE]
                          payload:
                            type: object
                userId:
                  type: string
                  description: User identifier for workflow ownership
              example:
                workflowId: "inv-2026-03-03-001"
                userId: "user123"
                steps:
                  - stepType: "inventory-adjust"
                    pgdFunction: "async function(items){for(const item of items){await db.query('UPDATE inventory SET quantity=quantity+$1 WHERE name=$2',[item.qty,item.name]);}}"
                    serviceCall:
                      url: "/serv/schema/inventory"
                      method: "POST"
                      payload: { name: "inventory", tables: ["items"] }
      responses:
        '200':
          description: Workflow started successfully
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  workflowId:
                    type: string
                  message:
                    type: string
              example:
                success: true
                workflowId: "inv-2026-03-03-001"
                message: "Workflow published to SYS-SQS-Workflow"
        '400':
          description: Invalid request
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
  /serv/schema:
    get:
      summary: List all schemas
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '200':
          description: List of schemas
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    tables:
                      type: array
                      items:
                        type: string
    post:
      summary: Create new schema
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sqlentity_name
                - primary_table
                - json_structure
                - field_definitions
              properties:
                sqlentity_name:
                  type: string
                  description: Unique name of the entity schema (primary key)
                tables:
                  type: array
                  description: Associated tables used by the entity
                  items:
                    type: string
                  example: ["PGD-Inventory", "PGD-Locations"]
                primary_table:
                  type: string
                  description: The main table associated with this entity
                  example: PGD-Inventory
                json_structure:
                  type: object
                  description: Entity JSON structure template
                  example:
                    entityTemplate:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                field_definitions:
                  type: object
                  description: Field-level definitions and validation rules
                  example:
                    item:
                      type: text
                      required: true
                    quantity:
                      type: integer
                      required: false
                relationships:
                  type: object
                  description: Relationship and foreign key mappings
                  example:
                    location:
                      foreign_table: PGD-Locations
                      local_key: location_id
                      foreign_key: id
      responses:
        '201':
          description: Schema created
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  id:
                    type: string

  /serv/schema/{schemaName}:
    get:
      summary: Get schema details
      parameters:
        - name: schemaName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '200':
          description: Schema details
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  tables:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        columns:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              type:
                                type: string
    put:
      summary: Update schema
      parameters:
        - name: schemaName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tables:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Schema updated successfully
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  tables:
                    type: array
                    items:
                      type: string

    delete:
      summary: Delete schema
      parameters:
        - name: schemaName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '204':
          description: Schema deleted
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'

  /serv/table:
    get:
      summary: List all tables across schemas
      parameters:
        - name: schema
          in: query
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '200':
          description: List of tables
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    schema:
                      type: string
    post:
      summary: Create new table
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, schema, columns]
              properties:
                name:
                  type: string
                schema:
                  type: string
                columns:
                  type: array
                  items:
                    type: object
                    required: [name, type]
                    properties:
                      name:
                        type: string
                      type:
                        type: string
      responses:
        '201':
          description: Table created
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  schema:
                    type: string
                  id:
                    type: string

  /serv/table/{schema}/{tableName}:
    get:
      summary: Get table details
      parameters:
        - name: schema
          in: path
          required: true
          schema:
            type: string
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '200':
          description: Table details
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  schema:
                    type: string
                  columns:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        type:
                          type: string
    delete:
      summary: Delete table
      parameters:
        - name: schema
          in: path
          required: true
          schema:
            type: string
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '204':
          description: Table deleted
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
