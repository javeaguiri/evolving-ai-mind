$kind: http-example
request:
  url: http://{{baseUrl}}/serv/schema
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "string",
        "tables": [
          "string",
          "string"
        ]
      }
