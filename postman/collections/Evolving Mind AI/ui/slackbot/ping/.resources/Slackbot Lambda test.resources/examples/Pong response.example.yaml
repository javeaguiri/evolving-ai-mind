$kind: http-example
request:
  url: http://{{baseUrl}}/ui/slackbot/ping
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "text": "Hello from Postman"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "text": "pong"
      }
order: 1000
