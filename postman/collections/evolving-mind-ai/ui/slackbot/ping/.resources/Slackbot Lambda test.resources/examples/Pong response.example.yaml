$kind: http-example
request:
  url: http://{{baseUrl}}/ui/slackbot/ping
  method: POST
  headers:
    - key: x-correlation-id
      value: string
      description: Correlation ID for request tracing
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  body:
    type: json
    content: |-
      {
        "text": "Hello from Postman"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
    x-correlation-id: ""
  body:
    type: json
    content: |-
      {
        "text": "pong"
      }
order: 1000
