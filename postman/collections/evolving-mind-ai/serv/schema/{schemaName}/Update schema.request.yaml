$kind: http-request
url: http://{{baseUrl}}/serv/schema/:schemaName
method: PUT
headers:
  - key: x-correlation-id
    value: string
    description: Correlation ID for request tracing
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  schemaName: string
body:
  type: json
  content: |-
    {
      "tables": [
        "string",
        "string"
      ]
    }
examples: ./.resources/Update schema.resources/examples
order: 2000
