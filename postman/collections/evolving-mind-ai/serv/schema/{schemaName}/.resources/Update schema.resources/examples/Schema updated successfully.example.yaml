$kind: http-example
request:
  url: http://{{baseUrl}}/serv/schema/:schemaName
  method: PUT
  headers:
    - key: x-correlation-id
      value: string
      description: Correlation ID for request tracing
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
  pathVariables:
    schemaName: string
  body:
    type: json
    content: |-
      {
        "tables": [
          "string",
          "string"
        ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
    x-correlation-id: ""
  body:
    type: text
    content: |-
      {
        "name": "string",
        "tables": [
          "string",
          "string"
        ]
      }
order: 1000
