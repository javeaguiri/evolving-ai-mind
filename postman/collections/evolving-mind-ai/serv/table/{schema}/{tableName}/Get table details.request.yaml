$kind: http-request
url: http://{{baseUrl}}/serv/table/:schema/:tableName
method: GET
headers:
  - key: x-correlation-id
    value: string
    description: Correlation ID for request tracing
  - key: Accept
    value: application/json
pathVariables:
  schema: string
  tableName: string
body:
  type: text
  content: ""
examples: ./.resources/Get table details.resources/examples
order: 1000
