$kind: http-request
url: http://{{baseUrl}}/serv/table
method: POST
headers:
  - key: x-correlation-id
    value: string
    description: Correlation ID for request tracing
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "schema": "string",
      "columns": [
        {
          "name": "string",
          "type": "string"
        },
        {
          "name": "string",
          "type": "string"
        }
      ]
    }
examples: ./.resources/Create new table.resources/examples
order: 2000
