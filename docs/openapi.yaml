openapi: 3.1.0
info:
  title: evolving-mind-ai
  version: 3.2.0
  description: >
    Self-evolving cognitive automation system.
    Slack → Lambda → PostgreSQL → LLM pipeline.
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: https://enwwi5aulf.execute-api.us-east-2.amazonaws.com/Prod
    description: AWS API Gateway — us-east-2

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------
components:
  parameters:
    CorrelationId:
      name: x-correlation-id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Client-supplied trace ID — generated if omitted

  schemas:
    CorrelationResponse:
      type: object
      properties:
        correlationId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    ColumnDefinition:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: recipe_id
        type:
          type: string
          enum:
            - serial
            - bigserial
            - text
            - varchar
            - integer
            - bigint
            - smallint
            - boolean
            - numeric
            - decimal
            - real
            - double precision
            - jsonb
            - json
            - timestamptz
            - timestamp
            - date
            - time
            - uuid
        primaryKey:
          type: boolean
        nullable:
          type: boolean
        unique:
          type: boolean
        default:
          type: string
          example: "now()"

    ForeignKeyDefinition:
      type: object
      required: [name, column, references]
      properties:
        name:
          type: string
        column:
          type: string
        references:
          type: object
          properties:
            table:
              type: string
            column:
              type: string
        onDelete:
          type: string
          enum: [CASCADE, RESTRICT, SET NULL, NO ACTION]
          default: RESTRICT

    ConstraintDefinition:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [unique, check]
        name:
          type: string
        columns:
          type: array
          items:
            type: string
        expression:
          type: string

    TriggerDefinition:
      type: object
      required: [name, timing, function]
      properties:
        name:
          type: string
        timing:
          type: string
          enum: [BEFORE UPDATE, BEFORE INSERT, AFTER UPDATE, AFTER INSERT]
        function:
          type: string
          example: set_updated_at()

    SchemaRow:
      type: object
      properties:
        id:
          type: integer
        table_name:
          type: string
        target:
          type: string
          enum: [pgc, pgd]
        description:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnDefinition'
        foreign_keys:
          type: array
          items:
            $ref: '#/components/schemas/ForeignKeyDefinition'
        constraints:
          type: array
          items:
            $ref: '#/components/schemas/ConstraintDefinition'
        triggers:
          type: array
          items:
            $ref: '#/components/schemas/TriggerDefinition'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SlackNotification:
      type: object
      properties:
        slackChannel:
          type: string
          example: C123456789
        slackThreadTs:
          type: string
          example: "1234567890.123456"

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # ── UI / Slackbot ──────────────────────────────────────────────────────────

  /api/v1/ui/slack/ping-api:
    post:
      summary: Slackbot health check
      description: Validates Slack → SlackbotFunction wiring. No DB, SQS, or LLM calls.
      tags: [Ping]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Pong
          content:
            application/json:
              example:
                success: true
                message: "🤖 ping-api — slackbot alive"
                correlationId: "abc-123"

  /api/v1/ui/slack/ping-sqs:
    post:
      summary: SQS round-trip ping
      description: >
        Validates Slack → SQS WorkflowQueue → ProcStepOrchestrator
        → SQS CallbackResults → SlackCallbackListenerFunction → Slack thread.
        ACK posted via chat.postMessage. Threaded reply arrives ~5s later.
      tags: [Ping]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: ACK accepted — result delivered to Slack thread

  /api/v1/ui/slack/ping-llm:
    post:
      summary: LLM round-trip ping
      description: Validates Slack → SlackbotFunction → ProcFunction → Perplexity → Slack.
      tags: [Ping]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Fortune cookie from LLM returned

  /api/v1/ui/slack/ping-e2e:
    post:
      summary: Full end-to-end ping
      description: >
        Validates full chain — Slack → SQS → ProcStepOrchestrator
        → ServFunction (ping-db) → SQS CallbackResults → SlackCallbackListenerFunction → Slack thread.
        Returns RDS PostgreSQL version string in thread.
      tags: [Ping]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: RDS version string delivered to Slack thread

  # ── PROC ───────────────────────────────────────────────────────────────────

  /api/v1/proc/ping-llm:
    post:
      summary: Direct LLM ping (curl)
      description: Validates PROC Lambda + LLM provider. No Slack or SQS.
      tags: [Ping]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        content:
          application/json:
            example:
              test: ping
      responses:
        '200':
          description: Fortune cookie from LLM
          content:
            application/json:
              example:
                success: true
                message: "Your Lambda will achieve enlightenment 🍪"
                correlationId: "abc-123"

  # ── SERV ───────────────────────────────────────────────────────────────────

  /api/v1/serv/ping-db:
    get:
      summary: PostgreSQL health check
      description: Validates ServFunction → PGC + PGD connectivity. Returns version strings.
      tags: [Ping]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Both databases reachable
          content:
            application/json:
              example:
                success: true
                pgc:
                  reachable: true
                  version: "PostgreSQL 16.6 on aarch64..."
                pgd:
                  reachable: true
                  version: "PostgreSQL 16.6 on aarch64..."
        '500':
          description: One or both databases unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/serv/schema/createTable:
    post:
      summary: Create a table + register in PGC_Schema
      description: >
        Executes DDL on target database (pgc or pgd), writes metadata row
        to PGC_Schema, registers in PGC_TableMap. Optionally notifies Slack.
        Column types are validated against a security whitelist before execution.
      tags: [SERV-Schema]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SlackNotification'
              type: object
              required: [tableName, target, columns]
              properties:
                tableName:
                  type: string
                  pattern: '^(PGC|PGD)_[A-Za-z][A-Za-z0-9_]*$'
                  example: PGD_Recipes
                target:
                  type: string
                  enum: [pgc, pgd]
                description:
                  type: string
                columns:
                  type: array
                  items:
                    $ref: '#/components/schemas/ColumnDefinition'
                foreignKeys:
                  type: array
                  items:
                    $ref: '#/components/schemas/ForeignKeyDefinition'
                constraints:
                  type: array
                  items:
                    $ref: '#/components/schemas/ConstraintDefinition'
                triggers:
                  type: array
                  items:
                    $ref: '#/components/schemas/TriggerDefinition'
            example:
              tableName: PGD_Recipes
              target: pgd
              description: Recipe domain table
              columns:
                - { name: id,         type: serial,      primaryKey: true }
                - { name: name,       type: text,        nullable: false }
                - { name: created_at, type: timestamptz, nullable: false, default: "now()" }
      responses:
        '200':
          description: Table created and registered
          content:
            application/json:
              example:
                success: true
                tableName: PGD_Recipes
                target: pgd
                schemaId: 5
                createdAt: "2026-03-11T15:18:24.000Z"
        '400':
          description: Validation error — invalid table name, missing fields, disallowed type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Table already exists in PGC_Schema
        '500':
          description: DDL execution or PGC write failed

  /api/v1/serv/schema/listTables:
    post:
      summary: List all tables in PGC_Schema
      description: Returns all registered tables, optionally filtered by target (pgc or pgd).
      tags: [SERV-Schema]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                target:
                  type: string
                  enum: [pgc, pgd]
                  description: Optional filter
            example:
              target: pgd
      responses:
        '200':
          description: Table list
          content:
            application/json:
              example:
                success: true
                count: 4
                tables:
                  - { id: 1, table_name: PGC_Schema, target: pgc }
                  - { id: 2, table_name: PGC_TableMap, target: pgc }

  /api/v1/serv/schema/getTable:
    post:
      summary: Get one table definition from PGC_Schema
      tags: [SERV-Schema]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tableName]
              properties:
                tableName:
                  type: string
            example:
              tableName: PGC_Schema
      responses:
        '200':
          description: Full schema row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaRow'
        '404':
          description: Table not found in PGC_Schema

  /api/v1/serv/schema/updateTable:
    post:
      summary: Update metadata in PGC_Schema
      description: >
        Updates description, columns, foreign_keys, constraints, or triggers
        in PGC_Schema. Does not execute ALTER TABLE — metadata only.
      tags: [SERV-Schema]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SlackNotification'
              type: object
              required: [tableName]
              properties:
                tableName:
                  type: string
                description:
                  type: string
                columns:
                  type: array
                  items:
                    $ref: '#/components/schemas/ColumnDefinition'
                foreignKeys:
                  type: array
                  items:
                    $ref: '#/components/schemas/ForeignKeyDefinition'
            example:
              tableName: PGD_Recipes
              description: Updated recipe domain table description
      responses:
        '200':
          description: Metadata updated
        '400':
          description: No updatable fields provided
        '404':
          description: Table not found

  /api/v1/serv/schema/deleteTable:
    post:
      summary: Drop table + remove from PGC_Schema
      description: >
        Drops the physical table (CASCADE) and removes rows from
        PGC_Schema and PGC_TableMap. Protected system tables
        (PGC_Schema, PGC_TableMap, PGC_EntitySchema, PGC_DomainHelp)
        are rejected with 403.
      tags: [SERV-Schema]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SlackNotification'
              type: object
              required: [tableName]
              properties:
                tableName:
                  type: string
            example:
              tableName: PGD_Recipes
      responses:
        '200':
          description: Table dropped and registry entries removed
        '403':
          description: Protected system table — cannot be dropped
        '404':
          description: Table not found in PGC_Schema
        '500':
          description: Drop or registry cleanup failed

  # ── SERV-Table ─────────────────────────────────────────────────────────────

  /api/v1/serv/table/getRows:
    post:
      summary: SELECT rows from a registered table
      description: >
        Parameterised SELECT gated by PGC_TableMap. Supports filters, orderBy,
        and limit. Column names in filters are validated against PGC_Schema.
        Filter operators — eq, neq, gt, gte, lt, lte, like, in, is_null, not_null.
      tags: [SERV-Table]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tableName]
              properties:
                tableName:
                  type: string
                  pattern: '^(PGC|PGD)_[A-Za-z][A-Za-z0-9_]*$'
                  example: PGC_Prompt
                filters:
                  type: array
                  items:
                    type: object
                    required: [column, op]
                    properties:
                      column:
                        type: string
                      op:
                        type: string
                        enum: [eq, neq, gt, gte, lt, lte, like, in, is_null, not_null]
                      value: {}
                orderBy:
                  type: object
                  properties:
                    column:
                      type: string
                    direction:
                      type: string
                      enum: [asc, desc]
                      default: asc
                limit:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 100
            example:
              tableName: PGC_Prompt
              filters:
                - { column: intent_category, op: eq, value: create_domain }
                - { column: was_successful,  op: not_null }
              orderBy: { column: version, direction: desc }
              limit: 10
      responses:
        '200':
          description: Matching rows returned
          content:
            application/json:
              example:
                success: true
                tableName: PGC_Prompt
                count: 1
                rows:
                  - id: 1
                    intent_category: create_domain
                    prompt_text: "You are a schema designer..."
                    version: 1
        '400':
          description: Validation error — bad table name, unknown column, disallowed operator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Table not registered in PGC_TableMap
        '500':
          description: Query failed

  /api/v1/serv/table/insertRow:
    post:
      summary: INSERT a single row into a registered table
      description: >
        Single INSERT gated by PGC_TableMap allow_insert flag.
        Column names validated against PGC_Schema. Returns full inserted row.
      tags: [SERV-Table]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tableName, row]
              properties:
                tableName:
                  type: string
                  pattern: '^(PGC|PGD)_[A-Za-z][A-Za-z0-9_]*$'
                  example: PGC_DomainHelp
                row:
                  type: object
                  description: Column/value pairs to insert
            example:
              tableName: PGC_DomainHelp
              row:
                domain: recipes
                aliases: ["recipe", "cooking"]
                description: Recipe management domain
                commands: []
      responses:
        '200':
          description: Row inserted
          content:
            application/json:
              example:
                success: true
                tableName: PGC_DomainHelp
                row:
                  id: 1
                  domain: recipes
        '400':
          description: Validation error — bad table name or unknown column
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: INSERT not permitted on this table
        '404':
          description: Table not registered in PGC_TableMap
        '500':
          description: Insert failed
