openapi: 3.1.0
info:
  title: evolving-mind-ai
  version: 3.2.0
  description: API for evolving-mind-ai — ping scaffolding phase
servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com/Prod
    description: AWS API Gateway (SAM deployed)
    variables:
      apiId:
        default: REPLACE_AFTER_FIRST_DEPLOY
      region:
        default: us-east-1
  - url: http://localhost:3000
    description: SAM local (sam local start-api)
components:
  headers:
    x-correlation-id:
      schema:
        type: string
      description: Unique request identifier for tracing (REQUIRED - caller must provide)
      required: true
paths:

  # ---------------------------------------------------------------------------
  # UI / SLACK LAYER  →  Lambda: SlackbotFunction
  # ---------------------------------------------------------------------------

  /api/v1/ui/slack/ping-api:
    post:
      summary: ping-api — Slackbot Lambda only (no downstream calls)
      operationId: pingApi
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
            example:
              text: "Hello from Postman"
      responses:
        '200':
          description: Immediate pong — validates Slack slash command wiring only
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  correlationId:
                    type: string
              example:
                success: true
                message: "🤖 pong-api"
                correlationId: "abc123"

  /api/v1/ui/slack/ping-sqs:
    post:
      summary: ping-sqs — Full SQS pipeline (Slack → PROC → SQS → SERV → SQS → Slack)
      operationId: pingSqs
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        '200':
          description: Immediate ACK — final result delivered via Slack thread ~30s later
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  correlationId:
                    type: string
              example:
                success: true
                message: "⏳ ping-sqs started — watch this thread"
                correlationId: "abc123"

  # ---------------------------------------------------------------------------
  # PROC LAYER  →  Lambda: ProcFunction
  # ---------------------------------------------------------------------------

  /api/v1/proc/ping-llm:
    post:
      summary: ping-llm — PROC Lambda + LLM (no Slack/SQS/DB)
      operationId: pingLlm
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
            example:
              text: "ping"
      responses:
        '200':
          description: LLM fortune cookie — validates ProcFunction + LLM API key
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  model:
                    type: string
                  correlationId:
                    type: string
              example:
                success: true
                message: "Your Lambda workflows will evolve! 🍪"
                model: "gpt-4o-mini"
                correlationId: "abc123"

  # ---------------------------------------------------------------------------
  # SERV LAYER  →  Lambda: ServFunction
  # ---------------------------------------------------------------------------

  /api/v1/serv/ping-db:
    get:
      summary: ping-db — SERV Lambda + PostgreSQL health check
      operationId: pingDb
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '200':
          description: DB reachable — validates ServFunction + Postgres connectivity
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  postgresVersion:
                    type: string
                  correlationId:
                    type: string
              example:
                success: true
                postgresVersion: "PostgreSQL 16.6"
                correlationId: "abc123"

  /api/v1/serv/schema:
    get:
      summary: List all schemas [STUB — Phase 2]
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
    post:
      summary: Create new schema [STUB — Phase 2]
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                tables:
                  type: array
                  items:
                    type: string
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'

  /api/v1/serv/schema/{schemaName}:
    get:
      summary: Get schema details [STUB — Phase 2]
      parameters:
        - name: schemaName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
    put:
      summary: Update schema [STUB — Phase 2]
      parameters:
        - name: schemaName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tables:
                  type: array
                  items:
                    type: string
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
    delete:
      summary: Delete schema [STUB — Phase 2]
      parameters:
        - name: schemaName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'

  /api/v1/serv/table:
    get:
      summary: List all tables [STUB — Phase 2]
      parameters:
        - name: schema
          in: query
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
    post:
      summary: Create new table [STUB — Phase 2]
      parameters:
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, schema, columns]
              properties:
                name:
                  type: string
                schema:
                  type: string
                columns:
                  type: array
                  items:
                    type: object
                    required: [name, type]
                    properties:
                      name:
                        type: string
                      type:
                        type: string
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'

  /api/v1/serv/table/{schema}/{tableName}:
    get:
      summary: Get table details [STUB — Phase 2]
      parameters:
        - name: schema
          in: path
          required: true
          schema:
            type: string
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
    delete:
      summary: Delete table [STUB — Phase 2]
      parameters:
        - name: schema
          in: path
          required: true
          schema:
            type: string
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: x-correlation-id
          in: header
          required: true
          schema:
            type: string
          description: Correlation ID for request tracing
      responses:
        '501':
          description: Not yet implemented
          headers:
            x-correlation-id:
              $ref: '#/components/headers/x-correlation-id'
