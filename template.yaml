AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for the PostgreSQL user
  YourKeyNameParameter:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the bastion.
  SlackWebhookParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /myapp/slack-webhook # Added the dash to match the console
  DBUser:
    Type: String
    Default: "lambda_user"
    Description: "Master username for PostgreSQL"
  DBName:
    Type: String
    Default: "evo_mind"
    Description: "The name of the initial database created"    
    
Resources:
  # --- EXISTING IAM ROLE ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaSQSQueueExecutionRole 
        
  EvoMindDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets for EvoMind RDS"
      DBSubnetGroupName: SYSSBNEvoMind  # This is the "Pretty" Name
      SubnetIds:
        - !Ref PublicSubnet
        - !Ref PublicSubnet2

  # --- EXISTING SQS QUEUES ---
  
  SchemaQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSchema  # This gives it the concise name you want
      # DeletionPolicy is 'Delete' by default now, so it won't "ghost" anymore

  SlackResultsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSlackResults

  WorkflowQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSWorkflow
      
  SchemaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSchemaDLQ

  SlackResultsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSlackResultsDLQ

  WorkflowDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSWorkflowDLQ
    
  # --- NETWORKING: The VPC ---
  EvoMindVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: evo-mind-vpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EvoMindVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true 
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: SYSSubnetPublic      
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EvoMindVPC
      CidrBlock: 10.0.2.0/24 # Different range
      MapPublicIpOnLaunch: true 
      AvailabilityZone: !Select [1, !GetAZs ''] # Different zone
      Tags:
        - Key: Name
          Value: SYSSubnetPublic2
          
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SYSIGWEvoMind
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref EvoMindVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EvoMindVPC
      Tags:
        - Key: Name
          Value: SYSRTBPublic

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
      
# --- SECURITY GROUPS ---
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from my Home IP
      GroupName: BSTSecGroup  # Match your manual change here
      VpcId: !Ref EvoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # CHANGE THIS to your specific IP for safety!  
      Tags:
        - Key: Name
          Value: SYSBSTSecGroup

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      # DO NOT add GroupName here (to avoid the Replacement crash)
      GroupDescription: Allow Lambda to reach RDS
      VpcId: !Ref EvoMindVPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0 # Better: Restrict this to your DB Subnet CIDR later
      Tags:
        - Key: Name
          Value: SYSLambSecGroup
          
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL traffic
      GroupName: SYSSGRRDS  # This is the "Pretty" Name
      VpcId: !Ref EvoMindVPC
      SecurityGroupIngress:
        # 1. Keep the existing Lambda access
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup 
        # 2. ADD THIS: Allow the Bastion (for your Excel connection)
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref BastionSecurityGroup 
      Tags:
        - Key: Name
          Value: SYSSGRRDS
          
  RDSPostgresIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup  
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      CidrIp: 0.0.0.0/0 # Allows the public Lambda to reach the DB

  # --- DATABASE: PostgreSQL ---
  EvoMindDB:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      EngineVersion: "16.6" 
      PubliclyAccessible: true
      DBInstanceClass: db.t4g.micro # Changed for lower cost/free tier
      DBInstanceIdentifier: SYSRDSEvoMind # This is the "Pretty" name
      DBName: !Ref DBName
      MasterUsername: !Ref DBUser 
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref EvoMindDBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      PubliclyAccessible: false 
      AllocatedStorage: '20'

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano # Smallest/Cheapest possible
      ImageId: ami-0ccabb5f82d4c9af5 # Standard Amazon Linux 2023 in us-east-2
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      KeyName: !Ref YourKeyNameParameter # You need to create a Key Pair in EC2 Console
      Tags:
        - Key: Name
          Value: SYSBSTHost # This will fill in the "Name" column in the EC2 Console
          


Outputs:
  RDSEndpoint:
    Description: "PostgreSQL Endpoint for Excel connection"
    Value: !GetAtt EvoMindDB.Endpoint.Address
  ApiUrl:
    Description: "URL for API Gateway"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/execute"
