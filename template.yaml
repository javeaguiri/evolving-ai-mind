AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  evolving-mind-ai v3.2
  Per-function Lambda routing — ping scaffolding phase.
  Each layer (UI/Slackbot, PROC, SERV, Callback) is its own Lambda.
  Routes are owned by this template; no path-switching in application code.
  
# -----------------------------------------------------------------------------
# Global defaults applied to every Function unless overridden
# -----------------------------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]          # Graviton2 — ~20% cheaper than x86
    MemorySize: 256
    Timeout: 29                     # API GW hard limit is 30 s
    Environment:
      Variables:
        LOG_LEVEL: info
        SQS_WORKFLOW_URL:       !Ref WorkflowQueue
        SQS_SLACK_RESULTS_URL:  !Ref SlackResultsQueue
  Api:
    # Every API response gets CORS headers — safe for future REST client
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Correlation-Id,Authorization'"
      AllowOrigin: "'*'" 
      
# -----------------------------------------------------------------------------
# Parameters
# -----------------------------------------------------------------------------
Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for the PostgreSQL user
  YourKeyNameParameter:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the bastion.
  SlackWebhookParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /myapp/slack-webhook # Added the dash to match the console
  DBUser:
    Type: String
    Default: "lambda_user"
    Description: "Master username for PostgreSQL"
  DBName:
    Type: String
    Default: "evo_mind"
    Description: "The name of the initial database created"    
    

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
Resources:
  # --- EXISTING IAM ROLE ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaSQSQueueExecutionRole 
      Policies:
        - PolicyName: SQSSendMessagePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource:
                  - !GetAtt WorkflowQueue.Arn
                  - !GetAtt SlackResultsQueue.Arn
                  - !GetAtt SchemaQueue.Arn

  # --- SQS QUEUES ---
  SchemaQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSchema  # This gives it the concise name you want
      # DeletionPolicy is 'Delete' by default now, so it won't "ghost" anymore
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SchemaDLQ.Arn
        maxReceiveCount: 3

  SlackResultsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSlackResults
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SlackResultsDLQ.Arn
        maxReceiveCount: 3

  WorkflowQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSWorkflow
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt WorkflowDLQ.Arn
        maxReceiveCount: 3

  SchemaDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSchemaDLQ
      MessageRetentionPeriod: 1209600

  SlackResultsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSSlackResultsDLQ
      MessageRetentionPeriod: 1209600

  WorkflowDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: SYSSQSWorkflowDLQ
      MessageRetentionPeriod: 1209600

  # --- NETWORKING ---
  EvoMindVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: evo-mind-vpc
          
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EvoMindVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true 
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: SYSSubnetPublic      
          
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EvoMindVPC
      CidrBlock: 10.0.2.0/24 # Different range
      MapPublicIpOnLaunch: true 
      AvailabilityZone: !Select [1, !GetAZs ''] # Different zone
      Tags:
        - Key: Name
          Value: SYSSubnetPublic2
          
  # --- DATABASE ---
  EvoMindDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets for EvoMind RDS"
      DBSubnetGroupName: SYSSBNEvoMind
      SubnetIds:
        - !Ref PublicSubnet
        - !Ref PublicSubnet2
                   
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: SYSIGWEvoMind
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref EvoMindVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EvoMindVPC
      Tags:
        - Key: Name
          Value: SYSRTBPublic

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable
      
# --- SECURITY GROUPS ---
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      # DO NOT add GroupName here (to avoid the Replacement crash)
      GroupDescription: Allow Lambda to reach RDS
      VpcId: !Ref EvoMindVPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0 # Better: Restrict this to your DB Subnet CIDR later
      Tags:
        - Key: Name
          Value: SYSLambSecGroup
          
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: BSTSecGroup
      GroupDescription: Allow SSH from my Home IP
      VpcId: !Ref EvoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0   # TODO: Restrict to your IP before going beyond prototype
      Tags:
        - Key: Name
          Value: SYSBSTSecGroup
          
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL traffic
      GroupName: SYSSGRRDS  # This is the "Pretty" Name
      VpcId: !Ref EvoMindVPC
      SecurityGroupIngress:
        # 1. Keep the existing Lambda access
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup 
        # 2. ADD THIS: Allow the Bastion (for your Excel connection)
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref BastionSecurityGroup 
      Tags:
        - Key: Name
          Value: SYSSGRRDS
          
  RDSPostgresIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup  
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      CidrIp: 0.0.0.0/0 # Allows the public Lambda to reach the DB
  # --- DATABASE: PostgreSQL ---
  EvoMindDB:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      EngineVersion: "16.6" 
      PubliclyAccessible: true
      DBInstanceClass: db.t4g.micro # Changed for lower cost/free tier
      DBInstanceIdentifier: SYSRDSEvoMind # This is the "Pretty" name
      DBName: !Ref DBName
      MasterUsername: !Ref DBUser 
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref EvoMindDBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      AllocatedStorage: '20'

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano # Smallest/Cheapest possible
      ImageId: ami-0ccabb5f82d4c9af5 # Standard Amazon Linux 2023 in us-east-2
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      KeyName: !Ref YourKeyNameParameter # You need to create a Key Pair in EC2 Console
      Tags:
        - Key: Name
          Value: SYSBSTHost # This will fill in the "Name" column in the EC2 Console

  # ===========================================================================
  # LAMBDA 1 — UI / Slackbot
  # Owns:  /api/v1/ui/slack/{proxy+}
  # Pings: POST /api/v1/ui/slack/ping-api
  #        POST /api/v1/ui/slack/ping-sqs
  # ===========================================================================
  SlackbotFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: evolving-mind-ai-slackbot
      Description: 'UI layer — Slack slash commands and interactive callbacks'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: handler.handler
      Environment:
        Variables:
          SLACK_BOT_TOKEN:      '{{resolve:ssm:/evolving-mind-ai/slack-bot-token}}'
          SLACK_SIGNING_SECRET: '{{resolve:ssm:/evolving-mind-ai/slack-signing-secret}}'
      Events:
        # Catch-all for all slackbot sub-routes.
        # The handler file does lightweight sub-path switching
        # (ping-api, ping-sqs, future commands) within a single layer.
        SlackbotProxy:
          Type: Api
          Properties:
            Path: /api/v1/ui/slack/{proxy+}
            Method: ANY
    Metadata:
      # ESM support: SAM wraps .mjs files transparently when package.json
      # has "type": "module". Explicit esbuild config not required for ping phase.
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
        EntryPoints:
          - src/ui/slackbot/handler.mjs

  # ===========================================================================
  # LAMBDA 2 — PROC (Process Orchestration)
  # Owns:  /api/v1/proc/{proxy+}
  # Pings: POST /api/v1/proc/ping-llm
  # ===========================================================================
  ProcFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: evolving-mind-ai-proc
      Description: 'PROC layer — workflow orchestration, LLM routing, SQS coordination'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: handler.handler
      Environment:
        Variables:
          LLM_API_KEY:          '{{resolve:ssm:/evolving-mind-ai/llm-api-key}}'
          SLACK_BOT_TOKEN:      '{{resolve:ssm:/evolving-mind-ai/slack-bot-token}}'
          SLACK_SIGNING_SECRET: '{{resolve:ssm:/evolving-mind-ai/slack-signing-secret}}'
      Events:
        ProcProxy:
          Type: Api
          Properties:
            Path: /api/v1/proc/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
        EntryPoints:
          - src/proc/handler.mjs

  # ===========================================================================
  # LAMBDA 3 — SERV (Service / JSON CRUD)
  # Owns:  /api/v1/serv/{proxy+}
  # Pings: GET /api/v1/serv/ping-db
  # ===========================================================================
  ServFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: evolving-mind-ai-serv
      Description: 'SERV layer — JSON-native CRUD/aggregation, DDL, DB health check'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: handler.handler
      Environment:
        Variables:
          PGC_DATABASE_URL:     '{{resolve:ssm:/evolving-mind-ai/pgc-database-url}}'
          PGD_DATABASE_URL:     '{{resolve:ssm:/evolving-mind-ai/pgd-database-url}}'
      Events:
        ServProxy:
          Type: Api
          Properties:
            Path: /api/v1/serv/{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs 
        EntryPoints:
          - src/serv/handler.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  # ===========================================================================
  # LAMBDA 4 — Slack Callback Listener  (SQS-triggered, no HTTP events)
  # Polls SYS-SQS-SlackResults → posts threaded replies to Slack
  # ===========================================================================
  SlackCallbackListenerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: evolving-mind-ai-slack-callback-listener
      Description: 'Consumes SQS SlackResults and posts threaded Slack messages'
      Role: !GetAtt LambdaExecutionRole.Arn
      Handler: callback.handler
      Environment:
        Variables:
          SLACK_BOT_TOKEN:      '{{resolve:ssm:/evolving-mind-ai/slack-bot-token}}'
          SLACK_SIGNING_SECRET: '{{resolve:ssm:/evolving-mind-ai/slack-signing-secret}}'
      Events:
        SlackResultsTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt SlackResultsQueue.Arn
            BatchSize: 1             # Process one result at a time for clean threading
            FunctionResponseTypes:
              - ReportBatchItemFailures
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
        EntryPoints:
          - src/ui/slackbot/callback.mjs

  # ===========================================================================
  # LAMBDA 5 — PROC Step Orchestrator (SQS-triggered)
  # TODO (Phase 2): Update Handler to src/proc/step-orchestrator.handler
  #                 once src/proc/step-orchestrator.mjs is written.
  #                 Currently points to legacy handler.mjs — not called during
  #                 scaffolding phase, safe to leave as placeholder.
  # ===========================================================================
  ProcStepOrchestrator:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      FunctionName: SYSLMBOrchestrator # "Pretty" name
      Handler: step-orchestrator.handler
      CodeUri: src/proc/
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        WorkflowTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt WorkflowQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Environment:
        Variables:
          SQS_SLACK_RESULTS_URL: !Ref SlackResultsQueue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
        EntryPoints:
          - step-orchestrator.mjs

# -----------------------------------------------------------------------------
# Outputs — merged into single block             FIX 2: duplicate Outputs removed
# -----------------------------------------------------------------------------
Outputs:

  ApiBaseUrl:
    Description: 'API Gateway base URL — append /api/v1/{layer}/{route}'
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod'
    Export:
      Name: !Sub '${AWS::StackName}-ApiBaseUrl'

  RDSEndpoint:
    Description: 'PostgreSQL endpoint for direct connections (bastion / Excel)'
    Value: !GetAtt EvoMindDB.Endpoint.Address

  SlackbotFunctionArn:
    Value: !GetAtt SlackbotFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SlackbotFunctionArn'

  ProcFunctionArn:
    Value: !GetAtt ProcFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ProcFunctionArn'

  ServFunctionArn:
    Value: !GetAtt ServFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ServFunctionArn'

  WorkflowQueueUrl:
    Value: !Ref WorkflowQueue
    Export:
      Name: !Sub '${AWS::StackName}-WorkflowQueueUrl'

  SlackResultsQueueUrl:
    Value: !Ref SlackResultsQueue
    Export:
      Name: !Sub '${AWS::StackName}-SlackResultsQueueUrl'
 