AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for the PostgreSQL user
  YourKeyNameParameter:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 KeyPair to enable SSH access to the bastion.
    
Resources:
  # --- EXISTING IAM ROLE ---
  LambdaExecutionRoleImported:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain # Fixed: Added to clear W3011
    Properties:
      RoleName: LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

  # --- EXISTING SQS QUEUES ---
  SchemaQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain # Fixed: Added to clear W3011
    Properties:
      QueueName: SYSSQSSchema

  SlackResultsQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: SYSSQSSlackResults

  WorkflowQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: SYSSQSWorkflow

  SchemaDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: SYSSQSSchemaDLQ

  SlackResultsDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: SYSSQSSlackResultsDLQ

  WorkflowDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      QueueName: SYSSQSWorkflowDLQ

  # --- NETWORKING: The VPC ---
  EvoMindVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: evo-mind-vpc

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref EvoMindVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true 
      AvailabilityZone: !Select [0, !GetAZs '']

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref EvoMindVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref EvoMindVPC

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- SECURITY GROUPS ---
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow Lambda to reach RDS
      VpcId: !Ref EvoMindVPC

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL traffic
      VpcId: !Ref EvoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup 

  # --- DATABASE: PostgreSQL ---
  EvoMindDB:
    Type: AWS::RDS::DBInstance
    Properties:
      Engine: postgres
      EngineVersion: "16.6" 
      DBInstanceClass: db.t4g.micro # Changed for lower cost/free tier
      DBName: evo_mind
      MasterUsername: lambda_user
      MasterUserPassword: !Ref DBPassword
      VPCSecurityGroups:
        - !GetAtt RDSSecurityGroup.GroupId
      PubliclyAccessible: false 
      AllocatedStorage: '20'

  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano # Smallest/Cheapest possible
      ImageId: ami-0ccabb5f82d4c9af5 # Standard Amazon Linux 2023 in us-east-2
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      KeyName: !Ref YourKeyNameParameter # You need to create a Key Pair in EC2 Console

  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH from my Home IP
      VpcId: !Ref EvoMindVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # CHANGE THIS to your specific IP for safety!  
          
  # --- LAMBDA FUNCTIONS ---
  MyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x # Fixed: Upgraded from deprecated 18.x
      Handler: handler.handler
      CodeUri: ./
      Role: arn:aws:iam::383941187976:role/LambdaExecutionRole
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PublicSubnet
      Events:
        ApiEvent:
          Type: Api
          Properties:
            Path: /execute
            Method: post
      Environment:
        Variables:
          DB_HOST: !GetAtt EvoMindDB.Endpoint.Address
          SLACK_WEBHOOK_URL: "your_webhook_here"
          
  ProcStepOrchestrator:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x # Fixed: Upgraded from deprecated 18.x
      Handler: handler.handler
      CodeUri: ./
      Role: !GetAtt LambdaExecutionRoleImported.Arn
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PublicSubnet
      Events:
        WorkflowTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt WorkflowQueue.Arn

Outputs:
  RDSEndpoint:
    Description: "PostgreSQL Endpoint for Excel connection"
    Value: !GetAtt EvoMindDB.Endpoint.Address
  ApiUrl:
    Description: "URL for API Gateway"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/execute"